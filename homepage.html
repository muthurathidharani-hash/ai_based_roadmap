<!DOCTYPE html>

<head>

<title>Dharani   Portfolio</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:linear-gradient(to right,#0f2027,#203a43,#2c5364);
    height:100vh;
    overflow:hidden;
    color:white;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 60px;
}

.logo{
    font-size:30px;
    font-weight:bold;
    color:#00ffff;
}

nav ul{
    display:flex;
    list-style:none;
    gap:30px;
}

nav ul li{
    cursor:pointer;
    transition:0.3s;
}

nav ul li:hover{
    color:#00ffff;
}

.hero{
    display:flex;
    justify-content:space-around;
    align-items:center;
    height:80vh;
    padding:50px;
}



.left h1{
    font-size:60px;
}

.left h1 span{
    color:#00ffff;
}

.left h2{
    margin-top:10px;
    font-size:35px;
}

.left p{
    margin-top:20px;
    width:500px;
    line-height:30px;
    color:#dcdcdc;
}

.buttons{
    margin-top:30px;
}

.buttons button{
    padding:15px 30px;
    margin-right:15px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    font-size:16px;
    transition:0.4s;
}

.btn1{
    background:#00ffff;
    color:black;
}

.btn2{
    background:transparent;
    border:2px solid #00ffff !important;
    color:white;
}

.buttons button:hover{
    transform:scale(1.1);
}


.circle{
    width:350px;
    height:350px;
    border-radius:50%;
    background:#00ffff;
    display:flex;
    justify-content:center;
    align-items:center;
    animation:float 3s infinite ease-in-out;
}

.circle img{
    width:330px;
    height:330px;
    border-radius:50%;
    object-fit:cover;
}

.social{
    position:absolute;
    bottom:30px;
    left:60px;
}

.social i{
    margin-right:20px;
    font-size:25px;
    cursor:pointer;
    transition:0.3s;
}

.social i:hover{
    color:#00ffff;
    transform:scale(1.3);
}
 .c{
    background-color: yellow;
    color: black;
    padding: 10px 20px;
    border-radius: 5px;
    border: none;
    cursor: pointer;
    position: absolute;  
    bottom: 20px;         
    right: 20px;     
    font-weight:bold;
    font-size:15px;   
}

</style>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

</div>

</div>

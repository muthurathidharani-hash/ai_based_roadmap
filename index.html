<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>
    <style>
        label {
            font-size: 20px;
            font-weight: bold;
            color: darkblue;
        }
        input {
            font-size: 18px;
            padding:10px;
            border: 2px solid;
            border-color:black;
            background-color:pink;
            border-radius: 5px;
            outline: blue; /* default focus outline remove */
            transition: 0.3s; /* smooth effect */
        }
        input:focus {
            border-color: purple;
            box-shadow: 0 0 20px rgb(164, 51, 164);
        }
        input[type="submit"] {
            font-size: 18px;
            padding: 10px 20px;
            background-color:pink;
            color: white;
            border-radius: 5px;
            cursor:grab;
        }
        input[type="submit"]:hover {
            background-color: green;
        }
        .div1{
            display:inline-block;
            background-color:lightgrey;
            padding:100px;
            text-align:center;
            border:10px solid lightgray;
            backdrop-filter:blur(30px);
            border-radius: 50px;
        }
        .for
        {
            text-align:right;
            font-size:20px;
            color:black;
        }
        button{
            background-color:green;
            border-radius:5px;
            font-size:20px;
        }
        button:hover{
            background-color:grey;
            cursor:pointer;
        }
        body{
            background-size:cover;
        }
    </style>
</head>
<center>
<body style="background-color:black">
<h2> Login</h2>
<div class="div1">
    <label for="username">Enter email or phno:</label><br>
    <input type="email" id="username"placeholder="email or phone number" name="useremail" required><br><br>

    <label for="password">Password:</label><br>
    <input type="password" id="password" name="password" placeholder="password" required><br><br>
   <button type="submit" onclick="func()">login</button>

</body>
</center>

</div>

<script>
function func() {
    var pas = document.getElementById("password").value;
    if (pas == "401") { 
        window.location.href = "homepage.html";
        alert("login success")
    } else {
        alert("Invalid password!");
        return false;
    }
}
</script>
</html>
